name: Deploy WordPress Code

on:
  push:
    branches:
      - main

  workflow_dispatch:
    inputs:
      target:
        description: "Destino del deploy"
        required: true
        default: "both"
        type: choice
        options:
          - algeciras
          - deportes
          - both

jobs:
  deploy-algeciras:
    name: Deploy to Algeciras
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || github.event.inputs.target == 'algeciras' || github.event.inputs.target == 'both' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy theme to Algeciras
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.ALG_FTP_SERVER }}
          username: ${{ secrets.ALG_FTP_USERNAME }}
          password: ${{ secrets.ALG_FTP_PASSWORD }}
          port: 21
          protocol: ftps
          local-dir: ./wp-content/themes/alminuto-theme/
          server-dir: ${{ secrets.FTP_SERVER_DIR_THEME }}
          state-name: .ftp-deploy-sync-state-theme-algeciras.json
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/vendor/bin/**
            **/.DS_Store
            **/Thumbs.db
            **/*.map
            **/*.sql
            **/*.sql.gz
            **/*.zip
            **/*.tar
            **/*.tar.gz
            **/*.tgz
            **/*.bak
            **/*.backup
            **/*.log
            **/.env
            **/.env.*

      - name: Deploy plugins to Algeciras
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.ALG_FTP_SERVER }}
          username: ${{ secrets.ALG_FTP_USERNAME }}
          password: ${{ secrets.ALG_FTP_PASSWORD }}
          port: 21
          protocol: ftps
          local-dir: ./wp-content/plugins/
          server-dir: ${{ secrets.FTP_SERVER_DIR_PLUGINS }}
          state-name: .ftp-deploy-sync-state-plugins-algeciras.json
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/vendor/bin/**
            **/.DS_Store
            **/Thumbs.db
            **/*.map
            **/*.sql
            **/*.sql.gz
            **/*.zip
            **/*.tar
            **/*.tar.gz
            **/*.tgz
            **/*.bak
            **/*.backup
            **/*.log
            **/.env
            **/.env.*

  deploy-deportes:
    name: Deploy to Deportes
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || github.event.inputs.target == 'deportes' || github.event.inputs.target == 'both' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy theme to Deportes
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.DEP_FTP_SERVER }}
          username: ${{ secrets.DEP_FTP_USERNAME }}
          password: ${{ secrets.DEP_FTP_PASSWORD }}
          port: 21
          protocol: ftps
          local-dir: ./wp-content/themes/alminuto-theme/
          server-dir: ${{ secrets.FTP_SERVER_DIR_THEME }}
          state-name: .ftp-deploy-sync-state-theme-deportes.json
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/vendor/bin/**
            **/.DS_Store
            **/Thumbs.db
            **/*.map
            **/*.sql
            **/*.sql.gz
            **/*.zip
            **/*.tar
            **/*.tar.gz
            **/*.tgz
            **/*.bak
            **/*.backup
            **/*.log
            **/.env
            **/.env.*

      - name: Deploy plugins to Deportes
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.DEP_FTP_SERVER }}
          username: ${{ secrets.DEP_FTP_USERNAME }}
          password: ${{ secrets.DEP_FTP_PASSWORD }}
          port: 21
          protocol: ftps
          local-dir: ./wp-content/plugins/
          server-dir: ${{ secrets.FTP_SERVER_DIR_PLUGINS }}
          state-name: .ftp-deploy-sync-state-plugins-deportes.json
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/vendor/bin/**
            **/.DS_Store
            **/Thumbs.db
            **/*.map
            **/*.sql
            **/*.sql.gz
            **/*.zip
            **/*.tar
            **/*.tar.gz
            **/*.tgz
            **/*.bak
            **/*.backup
            **/*.log
            **/.env
            **/.env.*